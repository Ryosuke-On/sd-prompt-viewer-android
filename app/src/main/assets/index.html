<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SD Prompt Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d0d;--surface:#181818;--surface2:#232323;--surface3:#2d2d2d;
  --accent:#8b6fd4;--text:#e8e8e8;--text2:#888;--border:#2e2e2e;
  --pos-color:#6fcf8b;--neg-color:#e07070;
  --lora-color:#70c0e0;--lora-bg:#1a2e38;
  --id-color:#e8c86e;--id-bg:#2e2814;
  --fav-color:#f0c060;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column}

/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;padding-top:calc(8px + env(safe-area-inset-top));flex-shrink:0;z-index:10}
.title-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.app-title{font-size:15px;font-weight:700;flex:1;background:linear-gradient(120deg,#a078e8,#6ab0e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.count-badge{font-size:12px;color:var(--text2)}
.btn-fav-open,.btn-cmp-toggle{position:relative;background:var(--surface3);border:1px solid var(--border);width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-fav-open{color:var(--fav-color)}.btn-cmp-toggle{color:var(--text2);font-size:14px}
.btn-cmp-toggle.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-fav-open:active,.btn-cmp-toggle:active{opacity:.7}
.fav-badge{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
.fav-badge.show{display:flex}
.path-bar{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.path-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:12px;font-family:monospace;min-width:0}
.path-input:focus{outline:none;border-color:var(--accent)}
.btn-open{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-open:active{opacity:.75}
.btn-icon{background:var(--surface3);color:var(--text);border:1px solid var(--border);padding:7px 11px;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-icon:active{opacity:.75}
.search-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.search-wrap,.filter-wrap{position:relative;flex:1;min-width:0}
.search-input,.filter-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px}
.search-input{padding:7px 28px 7px 32px}.filter-input{padding:7px 28px 7px 10px}
.search-input:focus,.filter-input:focus{outline:none;border-color:var(--accent)}
.filter-input.lora{border-color:rgba(112,192,224,.4)}.filter-input.lora:focus{border-color:var(--lora-color)}
.filter-input.model{border-color:rgba(111,207,139,.4)}.filter-input.model:focus{border-color:var(--pos-color)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:var(--text2)}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;display:none;padding:2px}
.sort-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 8px;font-size:12px;cursor:pointer;flex-shrink:0}
.filter-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.filter-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;padding:0 2px;min-width:36px;text-align:right}
.filter-label.lora{color:var(--lora-color)}.filter-label.model{color:var(--pos-color)}
.progress-wrap{height:3px;background:var(--surface2);display:none}
.progress-wrap.show{display:block}
.progress-bar{height:100%;background:var(--accent);width:0%;transition:width .1s}

/* ── Gallery ── */
.gallery-wrap{flex:1;overflow-y:auto;overscroll-behavior:contain}
.gallery-wrap.cmp-mode{outline:2px solid var(--accent);outline-offset:-2px}
.gallery{padding:4px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
@media(min-width:480px){.gallery{grid-template-columns:repeat(4,1fr)}}
@media(min-width:720px){.gallery{grid-template-columns:repeat(5,1fr)}}
.g-item{aspect-ratio:1;position:relative;overflow:hidden;border-radius:6px;cursor:pointer;background:var(--surface2)}
.g-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .15s}
.g-item:active img{transform:scale(.94)}
.g-item.hidden{display:none}
.g-item.cmp-selected{outline:3px solid var(--accent)}
.g-badges{position:absolute;bottom:3px;right:3px;display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end}
.g-badge{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;background:rgba(0,0,0,.72);line-height:1.2}
.gb-lora{color:var(--lora-color)}.gb-id{color:var(--id-color)}.gb-fmt{color:var(--text2)}
.g-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center}
.g-item:hover .g-del{display:flex}
.g-cmp-ov{position:absolute;inset:0;background:rgba(139,111,212,.45);border-radius:6px;display:none;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none}
.g-cmp-ov.show{display:flex}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--text2)}
.empty-state svg{opacity:.25;margin-bottom:14px}
.empty-state p{font-size:14px;line-height:1.7}

/* ── Dir picker ── */
.dir-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:none;flex-direction:column}
.dir-overlay.open{display:flex}
.dir-header{background:var(--surface);padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dir-title{font-size:14px;font-weight:600;flex:1}
.dir-current{font-size:11px;color:var(--text2);font-family:monospace;padding:6px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dir-list{flex:1;overflow-y:auto}
.dir-item{padding:13px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer}
.dir-item:active{background:var(--surface2)}
.dir-icon{font-size:20px;flex-shrink:0}
.dir-info{flex:1;min-width:0}
.dir-name{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dir-name.hidden-dir{color:var(--accent)}
.dir-meta{font-size:11px;color:var(--text2);margin-top:2px}
.dir-select{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;flex-shrink:0}

/* ── Favorites ── */
.fav-overlay{position:fixed;inset:0;background:var(--bg);z-index:400;display:none;flex-direction:column}
.fav-overlay.open{display:flex}
.fav-header{background:var(--surface);padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.fav-title{font-size:15px;font-weight:700;flex:1;color:var(--fav-color)}
.fav-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.fav-card{background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border)}
.fav-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fav-card-name{font-size:14px;font-weight:600;flex:1;color:var(--text)}
.fav-card-fmt{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--surface2);color:var(--text2)}
.fav-card-del{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:2px 4px}
.fav-card-del:active{color:var(--neg-color)}
.fav-section{margin-bottom:8px}
.fav-section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.fav-section-label.pos{color:var(--pos-color)}.fav-section-label.neg{color:var(--neg-color)}
.fav-preview{background:var(--surface2);border-radius:8px;padding:9px 10px;font-size:12px;line-height:1.5;color:var(--text);word-break:break-word;white-space:pre-wrap;border-left:2px solid}
.fav-preview.pos{border-left-color:var(--pos-color)}.fav-preview.neg{border-left-color:var(--neg-color)}
.fav-preview.empty{color:var(--text2);font-style:italic}
.fav-loras{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.fav-lora-chip{font-size:11px;background:var(--lora-bg);color:var(--lora-color);padding:2px 8px;border-radius:10px}
.fav-actions{display:flex;gap:6px;margin-top:10px}
.fav-copy-btn{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px;border-radius:8px;font-size:12px;cursor:pointer;text-align:center}
.fav-copy-btn:active,.fav-copy-btn.copied{background:var(--accent);border-color:var(--accent);color:#fff}
.fav-empty{text-align:center;padding:60px 24px;color:var(--text2);font-size:14px;line-height:1.7}

/* ── Save dialog ── */
.save-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end}
.save-overlay.open{display:flex}
.save-sheet{background:var(--surface);width:100%;border-radius:18px 18px 0 0;padding:20px 16px 32px}
.save-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--fav-color)}
.save-name-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px}
.save-name-input:focus{outline:none;border-color:var(--accent)}
.save-actions{display:flex;gap:8px}
.btn-save-confirm{flex:1;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save-cancel{background:var(--surface3);color:var(--text);border:1px solid var(--border);padding:11px 18px;border-radius:8px;font-size:14px;cursor:pointer}

/* ── Image view (combined) ── */
.iv-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}
.iv-overlay.open{display:flex}
.iv-header{background:var(--surface);padding:calc(8px + env(safe-area-inset-top)) 10px 8px;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid var(--border)}
.iv-nav{display:flex;gap:4px;flex-shrink:0}
.iv-nav-btn,.iv-close{background:var(--surface3);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.iv-close{color:var(--text);font-size:18px;width:36px;height:36px}
.iv-nav-btn:disabled{opacity:.3;pointer-events:none}
.iv-meta{flex:1;min-width:0}
.iv-fname{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.iv-fmt{display:inline-block;margin-top:2px;font-size:11px;padding:2px 7px;border-radius:10px;background:var(--surface3);color:var(--text2)}
.iv-img-area{flex:0 0 42vh;background:#000;overflow:hidden;touch-action:none;position:relative;display:flex;align-items:center;justify-content:center}
#iv-img{max-width:100%;max-height:100%;object-fit:contain;transform-origin:center center;will-change:transform;display:block;user-select:none;-webkit-user-drag:none;pointer-events:none}
.iv-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:rgba(255,255,255,.55);font-size:11px;padding:4px 12px;border-radius:12px;pointer-events:none;transition:opacity .5s}
.iv-hint.hide{opacity:0}
.iv-tab-bar{display:flex;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.iv-tab-bar::-webkit-scrollbar{display:none}
.iv-tab-btn{background:none;border:none;color:var(--text2);padding:9px 14px;font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px}
.iv-tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.iv-content{flex:1;overflow-y:auto;padding:14px;overscroll-behavior:contain}
.iv-tab-pane{display:none}.iv-tab-pane.active{display:block}

/* ── Compare overlay ── */
.cmp-overlay{position:fixed;inset:0;background:var(--bg);z-index:350;display:none;flex-direction:column}
.cmp-overlay.open{display:flex}
.cmp-header{background:var(--surface);padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cmp-title{font-size:14px;font-weight:600;flex:1}
.cmp-thumbs{display:flex;gap:8px;padding:10px 12px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}
.cmp-thumb{flex:1;min-width:0}
.cmp-thumb-img{width:100%;aspect-ratio:1.6;object-fit:cover;border-radius:8px;display:block}
.cmp-thumb-row{display:flex;align-items:center;gap:5px;margin-top:4px}
.cmp-thumb-num{font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
.cmp-thumb-name{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.cmp-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.cmp-section{background:var(--surface);border-radius:12px;padding:12px;border:1px solid var(--border)}
.cmp-sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.cmp-sec-label.pos{color:var(--pos-color)}.cmp-sec-label.neg{color:var(--neg-color)}
.cmp-img-num{font-size:11px;font-weight:700;color:var(--accent);margin:6px 0 3px;display:block}
.cmp-text{background:var(--surface2);border-radius:8px;padding:10px;font-size:12px;line-height:1.6;word-break:break-word;border-left:3px solid;color:var(--text)}
.cmp-text.pos{border-left-color:var(--pos-color)}.cmp-text.neg{border-left-color:var(--neg-color)}
.cmp-text em{color:var(--text2);font-style:italic}
mark.diff-u{background:rgba(139,111,212,.3);color:#c5a8ff;border-radius:3px;padding:0 2px}
.cmp-legend{font-size:11px;color:var(--text2);text-align:center;padding:2px 0}

/* ── Shared inner styles ── */
.prompt-block{margin-bottom:14px}
.prompt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:6px}
.prompt-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0}
.lbl-pos{color:var(--pos-color)}.lbl-neg{color:var(--neg-color)}
.prompt-actions{display:flex;gap:5px;flex-shrink:0}
.btn-copy,.btn-star{background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:4px 11px;border-radius:14px;font-size:11px;cursor:pointer;transition:background .12s;white-space:nowrap}
.btn-copy:active,.btn-copy.copied{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-star{color:var(--fav-color)}.btn-star:active{background:var(--fav-color);border-color:var(--fav-color);color:#000}
.prompt-text{background:var(--surface2);border-radius:10px;padding:11px 12px;font-size:13px;line-height:1.65;word-break:break-word;white-space:pre-wrap;border-left:3px solid}
.prompt-text.pos{border-left-color:var(--pos-color)}.prompt-text.neg{border-left-color:var(--neg-color)}
.prompt-text.empty{color:var(--text2);font-style:italic;border-left-color:var(--border)}
.lora-hi{background:var(--lora-bg);color:var(--lora-color);border-radius:4px;padding:0 3px;font-size:.92em}
.lora-list{display:flex;flex-direction:column;gap:6px}
.lora-item{background:var(--surface2);border-radius:10px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;border-left:3px solid var(--lora-color);gap:8px}
.lora-name{font-size:13px;font-weight:500;color:var(--lora-color);word-break:break-all;flex:1}
.lora-wt{font-size:11px;background:var(--lora-bg);padding:3px 10px;border-radius:12px;color:var(--lora-color);white-space:nowrap}
.id-item{background:var(--id-bg);border-radius:10px;padding:11px 13px;border-left:3px solid var(--id-color);margin-bottom:6px}
.id-source{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--id-color);margin-bottom:5px}
.id-detail{font-size:12px;color:var(--text);word-break:break-all}
.settings-list{display:flex;flex-direction:column;gap:3px}
.setting-row{display:flex;gap:8px;padding:7px 10px;border-radius:8px;background:var(--surface2);font-size:12px}
.sk{color:var(--text2);flex-shrink:0;min-width:90px}.sv{color:var(--text);word-break:break-all}
.no-data{color:var(--text2);font-size:13px;text-align:center;padding:28px;line-height:1.6}

.btn-close{background:var(--surface3);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(calc(100% + 60px));background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;transition:transform .2s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1 class="app-title">SD Prompt Viewer</h1>
    <span class="count-badge" id="count-badge"></span>
    <button class="btn-cmp-toggle" id="btn-cmp-toggle" onclick="toggleCompareMode()" title="比較モード">⚖</button>
    <button class="btn-fav-open" onclick="openFavorites()" title="お気に入り">★<span class="fav-badge" id="fav-badge"></span></button>
  </div>
  <div class="path-bar">
    <input type="text" class="path-input" id="path-input" placeholder="/storage/emulated/0/Pictures">
    <button class="btn-icon" onclick="openDirPicker()">📁</button>
    <button class="btn-open" onclick="openPath()">開く</button>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" class="search-input" id="search-input" placeholder="プロンプト・ファイル名で検索">
      <button class="clear-btn" id="search-clear" onclick="clearSearch()">×</button>
    </div>
    <select class="sort-select" id="sort-select" onchange="setSort(this.value)">
      <option value="newest">新しい順</option>
      <option value="oldest">古い順</option>
      <option value="name">名前順</option>
      <option value="format">形式順</option>
      <option value="random">ランダム</option>
    </select>
  </div>
  <div class="filter-row">
    <span class="filter-label lora">LoRA</span>
    <div class="filter-wrap">
      <input type="text" class="filter-input lora" id="lora-input" list="lora-datalist" placeholder="LoRA名で絞り込み">
      <datalist id="lora-datalist"></datalist>
      <button class="clear-btn" id="lora-clear" onclick="clearLoraFilter()">×</button>
    </div>
  </div>
  <div class="filter-row">
    <span class="filter-label model">Model</span>
    <div class="filter-wrap">
      <input type="text" class="filter-input model" id="model-input" list="model-datalist" placeholder="モデル名で絞り込み">
      <datalist id="model-datalist"></datalist>
      <button class="clear-btn" id="model-clear" onclick="clearModelFilter()">×</button>
    </div>
  </div>
</header>

<div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>

<div class="gallery-wrap" id="gallery-wrap">
  <div class="gallery" id="gallery">
    <div class="empty-state" id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      <p>フォルダパスを入力して「開く」<br>隠しフォルダも読み込めます</p>
    </div>
  </div>
</div>

<!-- Dir picker -->
<div class="dir-overlay" id="dir-overlay">
  <div class="dir-header">
    <button class="btn-close" onclick="closeDirPicker()">×</button>
    <span class="dir-title">フォルダを選択</span>

<script>
'use strict';

// ═══════════════════════════════════════════
//  PNG parser
// ═══════════════════════════════════════════
function parsePNGChunks(buf){
  const a=new Uint8Array(buf);
  const SIG=[137,80,78,71,13,10,26,10];
  for(let i=0;i<8;i++)if(a[i]!==SIG[i])return null;
  const R32=o=>((a[o]<<24)|(a[o+1]<<16)|(a[o+2]<<8)|a[o+3])>>>0;
  const L1=(s,e)=>{let r='';for(let i=s;i<e;i++)r+=String.fromCharCode(a[i]);return r;};
  const nullAt=(s,e)=>{for(let i=s;i<e;i++)if(a[i]===0)return i;return -1;};
  const chunks={};let off=8;
  while(off+12<=a.length){
    const len=R32(off);const type=L1(off+4,off+8);
    if(type==='tEXt'&&off+8+len<=a.length){
      const end=off+8+len;const ni=nullAt(off+8,end);
      if(ni>=0){const key=L1(off+8,ni);const val=L1(ni+1,end);if(!(key in chunks))chunks[key]=val;}
    }else if(type==='iTXt'&&off+8+len<=a.length){
      let p=off+8;const end=off+8+len;
      const ni=nullAt(p,end);if(ni<0){off+=12+len;continue;}
      const key=L1(p,ni);p=ni+1;if(p+2>end){off+=12+len;continue;}
      const compr=a[p];p+=2;
      const ni2=nullAt(p,end);if(ni2<0){off+=12+len;continue;}p=ni2+1;
      const ni3=nullAt(p,end);if(ni3<0){off+=12+len;continue;}p=ni3+1;
      if(compr===0){try{const val=new TextDecoder('utf-8').decode(a.slice(p,end));if(!(key in chunks))chunks[key]=val;}catch(e){}}
    }
    if(type==='IEND')break;off+=12+len;
  }
  return chunks;
}

// ═══════════════════════════════════════════
//  JPEG EXIF
// ═══════════════════════════════════════════
function readJpegUserComment(buf){
  const a=new Uint8Array(buf);
  if(a[0]!==0xFF||a[1]!==0xD8)return null;
  let off=2;
  while(off+4<a.length){
    if(a[off]!==0xFF)break;
    const mk=a[off+1];if(mk===0xDA)break;
    const slen=(a[off+2]<<8)|a[off+3];
    if(mk===0xE1){
      const EX=[0x45,0x78,0x69,0x66,0,0];let ok=true;
      for(let i=0;i<6;i++)if(a[off+4+i]!==EX[i]){ok=false;break;}
      if(ok){const c=parseExifUC(a,off+10);if(c)return c;}
    }
    off+=2+slen;
  }
  return null;
}
function parseExifUC(a,to){
  const le=a[to]===0x49;
  const R16=o=>le?(a[to+o]|(a[to+o+1]<<8)):((a[to+o]<<8)|a[to+o+1]);
  const R32=o=>le?((a[to+o]|(a[to+o+1]<<8)|(a[to+o+2]<<16)|(a[to+o+3]<<24))>>>0):(((a[to+o]<<24)|(a[to+o+1]<<16)|(a[to+o+2]<<8)|a[to+o+3])>>>0);
  if(R16(2)!==0x002A)return null;
  const ifd0=R32(4);const cnt0=R16(ifd0);let subOff=-1;
  for(let i=0;i<cnt0;i++){const e=ifd0+2+i*12;if(R16(e)===0x8769){subOff=R32(e+8);break;}}
  if(subOff<0)return null;
  const cntS=R16(subOff);
  for(let i=0;i<cntS;i++){
    const e=subOff+2+i*12;
    if(R16(e)===0x9286){
      const cnt=R32(e+4);const valOff=cnt>4?R32(e+8):e+8;
      const cs=Array.from(a.slice(to+valOff,to+valOff+8)).map(b=>String.fromCharCode(b)).join('').replace(/\0/g,'').trim();
      const tb=a.slice(to+valOff+8,to+valOff+cnt);
      let txt;
      try{txt=cs==='UNICODE'?new TextDecoder('utf-16'+(le?'le':'be')).decode(tb):new TextDecoder('utf-8').decode(tb);}
      catch(e2){txt=Array.from(tb).map(b=>String.fromCharCode(b)).join('');}
      return txt.replace(/\0/g,'').trim()||null;
    }
  }
  return null;
}

// ═══════════════════════════════════════════
//  Format parsers
// ═══════════════════════════════════════════
function extractLoras(t){
  const r=[];const rx=/<lora:([^:>]+):([^>]+)>/g;let m;
  while((m=rx.exec(t))!==null)r.push({name:m[1],weight:m[2]});return r;
}
function parseA1111(raw){
  const stRx=/\n(Steps|Sampler|CFG scale|Seed|Size|Model hash|Hires|ControlNet)/;
  const stM=stRx.exec(raw);const stIdx=stM?stM.index:-1;
  const body=stIdx>=0?raw.slice(0,stIdx):raw;
  const settingsText=stIdx>=0?raw.slice(stIdx+1):'';
  const negMark='\nNegative prompt:';const negMarkAlt='Negative prompt:';
  let pos='',neg='';
  const ni=body.indexOf(negMark);
  if(ni>=0){pos=body.slice(0,ni).trim();neg=body.slice(ni+negMark.length).trim();}
  else{
    const ni2=body.indexOf(negMarkAlt);
    if(ni2===0){neg=body.slice(negMarkAlt.length).trim();}
    else if(ni2>0){pos=body.slice(0,ni2).trim();neg=body.slice(ni2+negMarkAlt.length).trim();}
    else{pos=body.trim();}
  }
  const settings=parseKVSettings(settingsText);
  const loras=[...extractLoras(pos),...extractLoras(neg)];
  const instantID=detectInstantA1111(settings,raw);
  return{format:'A1111',positive:pos,negative:neg,settings,loras,instantID};
}
function parseKVSettings(text){
  const s={};
  const parts=text.split(/,\s*(?=[A-Za-z][A-Za-z0-9 _]*:)/);
  for(const p of parts){const ci=p.indexOf(':');if(ci>0){const k=p.slice(0,ci).trim();const v=p.slice(ci+1).trim();if(k&&v)s[k]=v;}}
  return s;
}
function detectInstantA1111(settings,raw){
  const r=[];
  for(const[k,v]of Object.entries(settings)){
    if(/instant.?id/i.test(k)||(/controlnet/i.test(k)&&/instant.?id/i.test(v)))r.push({source:k,detail:v});
  }
  for(const m of raw.matchAll(/instant.?id\s*[^\n,]*/gi)){
    const d=m[0].trim();if(!r.some(x=>x.detail===d))r.push({source:'detected',detail:d});
  }
  return r;
}
function parseComfyUI(pj){
  let pos='',neg='';const loras=[];const instantID=[];const settings={};
  for(const[,nd]of Object.entries(pj)){
    const ct=nd.class_type||'';const inp=nd.inputs||{};
    if(/loraloader/i.test(ct)){
      loras.push({name:inp.lora_name||'?',weight:inp.strength_model!==undefined?String(inp.strength_model):inp.strength!==undefined?String(inp.strength):'?',weight_clip:inp.strength_clip!==undefined?String(inp.strength_clip):undefined});
    }
    if(/instantid/i.test(ct)){instantID.push({source:ct,detail:JSON.stringify(inp).replace(/"[^"]*":/g,'').slice(0,160)});}
    if(/^KSampler/i.test(ct)){
      if(inp.seed!==undefined)settings['Seed']=String(inp.seed);
      if(inp.steps!==undefined)settings['Steps']=String(inp.steps);
      if(inp.cfg!==undefined)settings['CFG scale']=String(inp.cfg);
      if(inp.sampler_name)settings['Sampler']=inp.sampler_name;
      if(inp.scheduler)settings['Scheduler']=inp.scheduler;
      if(inp.denoise!==undefined)settings['Denoise']=String(inp.denoise);
      if(Array.isArray(inp.positive)){const t=resolveClipText(pj,String(inp.positive[0]));if(t)pos=t;}
      if(Array.isArray(inp.negative)){const t=resolveClipText(pj,String(inp.negative[0]));if(t)neg=t;}
    }
    if(/^CheckpointLoader/i.test(ct)&&inp.ckpt_name)settings['Model']=inp.ckpt_name;
    if(ct==='EmptyLatentImage'&&inp.width&&inp.height)settings['Size']=`${inp.width}x${inp.height}`;
  }
  if(!pos&&!neg){
    const clips=Object.entries(pj).filter(([,n])=>/CLIPTextEncode/i.test(n.class_type||'')&&typeof(n.inputs?.text)==='string').map(([,n])=>n.inputs.text);
    if(clips[0])pos=clips[0];if(clips[1])neg=clips[1];
  }
  for(const l of extractLoras(pos+' '+neg))if(!loras.some(x=>x.name===l.name))loras.push(l);
  return{format:'ComfyUI',positive:pos,negative:neg,settings,loras,instantID};
}
function resolveClipText(pj,nodeId,depth=0){
  if(depth>6)return'';const nd=pj[nodeId];if(!nd)return'';
  if(/CLIPTextEncode/i.test(nd.class_type||'')&&typeof nd.inputs?.text==='string')return nd.inputs.text;
  for(const v of Object.values(nd.inputs||{})){
    if(Array.isArray(v)&&typeof v[0]==='string'){const t=resolveClipText(pj,v[0],depth+1);if(t)return t;}
  }
  return'';
}
function parseFooocus(json){
  const pos=json.prompt||'';const neg=json.negative_prompt||'';
  const loras=(json.loras||[]).map(l=>({name:l.model_name||l.name||'?',weight:String(l.weight??'?')}));
  const settings={};
  for(const f of['steps','sampler','scheduler','cfg','seed','resolution','base_model_name'])if(json[f]!==undefined)settings[f]=String(json[f]);
  return{format:'Fooocus',positive:pos,negative:neg,settings,loras,instantID:[]};
}
function parseInvokeAI(json){
  const pos=json.positive_prompt||json.prompt||'';const neg=json.negative_prompt||'';
  const settings={};
  for(const f of['seed','steps','cfg_scale','scheduler','model','width','height'])if(json[f]!==undefined)settings[f]=String(json[f]);
  const loras=(json.loras||[]).map(l=>({name:l.model?.name||l.name||'?',weight:String(l.weight??'?')}));
  return{format:'InvokeAI',positive:pos,negative:neg,settings,loras,instantID:[]};
}
function detectAndParse(chunks,jpegComment){
  if(chunks['sui_image_params']){try{const j=JSON.parse(chunks['sui_image_params']);return{format:'SwarmUI',positive:j.prompt||'',negative:j.negativeprompt||'',settings:{},loras:extractLoras((j.prompt||'')+' '+(j.negativeprompt||'')),instantID:[]};}catch(e){}}
  if(chunks['parameters']){if(!chunks['prompt']||/Steps:|Sampler:|Seed:/.test(chunks['parameters']))return parseA1111(chunks['parameters']);}
  if(chunks['invokeai_metadata']){try{return parseInvokeAI(JSON.parse(chunks['invokeai_metadata']));}catch(e){}}
  if(chunks['Comment']){try{const j=JSON.parse(chunks['Comment']);if(j.prompt!==undefined)return parseFooocus(j);}catch(e){}}
  if(chunks['prompt']){try{return parseComfyUI(JSON.parse(chunks['prompt']));}catch(e){}}
  if(jpegComment)return parseA1111(jpegComment);
  return null;
}
function base64ToBuffer(b64){
  const bin=atob(b64);const buf=new ArrayBuffer(bin.length);
  const v=new Uint8Array(buf);for(let i=0;i<bin.length;i++)v[i]=bin.charCodeAt(i);return buf;
}
function readMetaApp(path){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const b64=window.AndroidBridge.readFileBase64(path);
      if(!b64){resolve(null);return;}
      const buffer=base64ToBuffer(b64);const arr=new Uint8Array(buffer);
      let chunks={},jpegComment=null;
      if(arr[0]===137&&arr[1]===80){chunks=parsePNGChunks(buffer)||{};}
      else if(arr[0]===0xFF&&arr[1]===0xD8){jpegComment=readJpegUserComment(buffer);}
      resolve(detectAndParse(chunks,jpegComment));
    },0);
  });
}

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
const images=[];
let currentIdx=-1;
let visibleList=[];
let currentSort='newest';
let promptQuery='';
let loraQuery='';
let modelQuery='';
let compareMode=false;
let compareSelected=[];
let _backInProgress=false;

// ═══════════════════════════════════════════
//  Gallery
// ═══════════════════════════════════════════
const gallery=document.getElementById('gallery');
const emptyState=document.getElementById('empty-state');
const countBadge=document.getElementById('count-badge');
const progressWrap=document.getElementById('progress-wrap');
const progressBar=document.getElementById('progress-bar');

function showProgress(pct){progressWrap.classList.add('show');progressBar.style.width=pct+'%';}
function hideProgress(){setTimeout(()=>{progressWrap.classList.remove('show');progressBar.style.width='0%';},400);}

async function openPath(){
  const path=document.getElementById('path-input').value.trim();
  if(!path)return;
  if(!window.AndroidBridge.exists(path)){showToast('フォルダが見つかりません');return;}
  saveRecent(path);
  await loadFolder(path);
}

async function loadFolder(path){
  const files=JSON.parse(window.AndroidBridge.listImages(path));
  images.length=0;
  gallery.querySelectorAll('.g-item').forEach(el=>el.remove());
  emptyState.style.display='none';
  if(!files.length){
    emptyState.style.display='';
    emptyState.querySelector('p').textContent='画像が見つかりませんでした';
    return;
  }
  showProgress(0);
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const data=await readMetaApp(f.path);
    images.push({name:f.name,path:f.path,url:`localfile://${f.path}`,data,modified:f.modified||0});
    renderGalleryItem(images.length-1);
    showProgress((i+1)/files.length*100);
  }
  hideProgress();
  updateLoraDatalist();
  updateModelDatalist();
  rebuildVisibleList();
  updateCount();
}

function renderGalleryItem(idx){
  const item=images[idx];
  const div=document.createElement('div');
  div.className='g-item';div.dataset.idx=idx;
  const img=document.createElement('img');
  img.src=item.url;img.loading='lazy';div.appendChild(img);
  const d=item.data;const badges=[];
  if(d){
    if(d.loras?.length)badges.push(`<span class="g-badge gb-lora">L×${d.loras.length}</span>`);
    if(d.instantID?.length)badges.push(`<span class="g-badge gb-id">ID</span>`);
    badges.push(`<span class="g-badge gb-fmt">${d.format}</span>`);
  }
  if(badges.length){const bd=document.createElement('div');bd.className='g-badges';bd.innerHTML=badges.join('');div.appendChild(bd);}
  const del=document.createElement('button');
  del.className='g-del';del.innerHTML='×';
  del.onclick=ev=>{ev.stopPropagation();removeImage(idx);};
  div.appendChild(del);
  const cov=document.createElement('div');cov.className='g-cmp-ov';div.appendChild(cov);
  div.onclick=()=>{
    if(compareMode){toggleCompareSelect(idx);return;}
    const vi=visibleList.indexOf(idx);if(vi<0)return;
    openImageView(idx);
  };
  gallery.appendChild(div);
}

function removeImage(idx){
  const el=gallery.querySelector(`.g-item[data-idx="${idx}"]`);
  if(el)el.remove();
  images.splice(idx,1);
  gallery.querySelectorAll('.g-item').forEach(el=>{
    const i=+el.dataset.idx;if(i>idx)el.dataset.idx=i-1;
  });
  visibleList=visibleList.map(i=>i>idx?i-1:i).filter(i=>i!==idx);
  updateCount();
  if(document.getElementById('iv-overlay').classList.contains('open'))closeImageView();
}

function updateCount(){
  const vis=visibleList.length,tot=images.length;
  if(!tot){countBadge.textContent='';return;}
  countBadge.textContent=vis<tot?`${vis}/${tot}枚`:`${tot}枚`;
}

// ═══════════════════════════════════════════
//  Search / Filter
// ═══════════════════════════════════════════
let searchTimer;
document.getElementById('search-input').addEventListener('input',e=>{
  promptQuery=e.target.value;
  document.getElementById('search-clear').style.display=promptQuery?'block':'none';
  clearTimeout(searchTimer);searchTimer=setTimeout(()=>rebuildVisibleList(),200);
});
document.getElementById('lora-input').addEventListener('input',e=>{
  loraQuery=e.target.value.trim();
  document.getElementById('lora-clear').style.display=loraQuery?'block':'none';
  clearTimeout(searchTimer);searchTimer=setTimeout(()=>rebuildVisibleList(),200);
});
document.getElementById('model-input').addEventListener('input',e=>{
  modelQuery=e.target.value.trim();
  document.getElementById('model-clear').style.display=modelQuery?'block':'none';
  clearTimeout(searchTimer);searchTimer=setTimeout(()=>rebuildVisibleList(),200);
});

function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';promptQuery='';rebuildVisibleList();}
function clearLoraFilter(){document.getElementById('lora-input').value='';document.getElementById('lora-clear').style.display='none';loraQuery='';rebuildVisibleList();}
function clearModelFilter(){document.getElementById('model-input').value='';document.getElementById('model-clear').style.display='none';modelQuery='';rebuildVisibleList();}

function itemMatches(item){
  const d=item.data;
  if(promptQuery){
    const lq=promptQuery.toLowerCase();
    const ok=d?((d.positive||'').toLowerCase().includes(lq)||(d.negative||'').toLowerCase().includes(lq)||item.name.toLowerCase().includes(lq)):item.name.toLowerCase().includes(lq);
    if(!ok)return false;
  }
  if(loraQuery){
    if(!(d?.loras||[]).some(l=>l.name.toLowerCase().includes(loraQuery.toLowerCase())))return false;
  }
  if(modelQuery){
    if(!(d?.settings?.Model||'').toLowerCase().includes(modelQuery.toLowerCase()))return false;
  }
  return true;
}

function updateLoraDatalist(){
  const dl=document.getElementById('lora-datalist');dl.innerHTML='';
  const seen=new Set();
  for(const img of images)for(const l of img.data?.loras||[])if(l.name&&!seen.has(l.name)){seen.add(l.name);const o=document.createElement('option');o.value=l.name;dl.appendChild(o);}
}
function updateModelDatalist(){
  const dl=document.getElementById('model-datalist');dl.innerHTML='';
  const seen=new Set();
  for(const img of images){const m=img.data?.settings?.Model;if(m&&!seen.has(m)){seen.add(m);const o=document.createElement('option');o.value=m;dl.appendChild(o);}}
}

// ═══════════════════════════════════════════
//  Sort
// ═══════════════════════════════════════════
function setSort(val){currentSort=val;rebuildVisibleList();}

function compareItems(a,b){
  switch(currentSort){
    case'newest':return(b.modified||0)-(a.modified||0);
    case'oldest':return(a.modified||0)-(b.modified||0);
    case'name':return a.name.localeCompare(b.name,'ja');
    case'format':return(a.data?.format||'').localeCompare(b.data?.format||'');
  }
  return 0;
}

function rebuildVisibleList(){
  visibleList=images.map((_,i)=>i).filter(i=>itemMatches(images[i]));
  if(currentSort==='random'){
    for(let i=visibleList.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [visibleList[i],visibleList[j]]=[visibleList[j],visibleList[i]];
    }
  }else{
    visibleList.sort((a,b)=>compareItems(images[a],images[b]));
  }
  const allItems=gallery.querySelectorAll('.g-item');
  allItems.forEach(el=>el.classList.add('hidden'));
  visibleList.forEach(idx=>{
    const el=gallery.querySelector(`.g-item[data-idx="${idx}"]`);
    if(el){el.classList.remove('hidden');gallery.appendChild(el);}
  });
  updateCount();
}

// ═══════════════════════════════════════════
//  Dir picker
// ═══════════════════════════════════════════
let dirStack=[];
function openDirPicker(){
  const p=window.AndroidBridge.getPicturesPath();dirStack=[p];renderDirList(p);
  history.pushState({overlay:'dir'},'');
  document.getElementById('dir-overlay').classList.add('open');
}
function closeDirPicker(){
  document.getElementById('dir-overlay').classList.remove('open');
  if(!_backInProgress)history.back();
}
function dirUp(){if(dirStack.length<=1)return;dirStack.pop();renderDirList(dirStack[dirStack.length-1]);}
function renderDirList(path){
  document.getElementById('dir-current').textContent=path;
  document.getElementById('dir-up-btn').disabled=dirStack.length<=1;
  const dirs=JSON.parse(window.AndroidBridge.listDirs(path));
  const list=document.getElementById('dir-list');list.innerHTML='';
  const selRow=document.createElement('div');selRow.className='dir-item';selRow.style.background='var(--surface2)';
  selRow.innerHTML=`<span class="dir-icon">✓</span><div class="dir-info"><div class="dir-name" style="color:var(--accent)">このフォルダを開く</div><div class="dir-meta">${path}</div></div>`;
  selRow.onclick=()=>selectDir(path);list.appendChild(selRow);
  if(!dirs.length){const e=document.createElement('div');e.style.cssText='padding:24px;text-align:center;color:var(--text2);font-size:13px';e.textContent='サブフォルダなし';list.appendChild(e);return;}
  for(const d of dirs){
    const row=document.createElement('div');row.className='dir-item';
    const count=d.imageCount>0?`${d.imageCount}枚の画像`:'';
    const hl=d.hidden?'<span style="font-size:10px;background:#3a2a6a;color:#b090f0;padding:1px 5px;border-radius:4px;margin-left:4px">hidden</span>':'';
    row.innerHTML=`<span class="dir-icon">📁</span><div class="dir-info"><div class="dir-name ${d.hidden?'hidden-dir':''}">${esc(d.name)}${hl}</div>${count?`<div class="dir-meta">${count}</div>`:''}</div><button class="dir-select" onclick="event.stopPropagation();selectDir('${d.path.replace(/'/g,"\\'")}')">開く</button>`;
    row.onclick=()=>drillDown(d.path);list.appendChild(row);
  }
}
function drillDown(path){dirStack.push(path);renderDirList(path);}
function selectDir(path){document.getElementById('path-input').value=path;closeDirPicker();loadFolder(path);}
function saveRecent(path){try{let r=JSON.parse(localStorage.getItem('recentPaths')||'[]');r=[path,...r.filter(p=>p!==path)].slice(0,5);localStorage.setItem('recentPaths',JSON.stringify(r));}catch(e){}}

// ═══════════════════════════════════════════
//  Favorites
// ═══════════════════════════════════════════
const FAV_KEY='sdpv_favorites';
function loadFavs(){try{return JSON.parse(localStorage.getItem(FAV_KEY)||'[]');}catch(e){return[];}}
function saveFavs(favs){localStorage.setItem(FAV_KEY,JSON.stringify(favs));}
function updateFavBadge(){const n=loadFavs().length;const b=document.getElementById('fav-badge');b.textContent=n;b.classList.toggle('show',n>0);}

function openFavorites(){
  renderFavoritesList();
  history.pushState({overlay:'fav'},'');
  document.getElementById('fav-overlay').classList.add('open');
}
function closeFavorites(){
  document.getElementById('fav-overlay').classList.remove('open');
  if(!_backInProgress)history.back();
}
function renderFavoritesList(){
  const favs=loadFavs();const list=document.getElementById('fav-list');list.innerHTML='';
  if(!favs.length){list.innerHTML='<div class="fav-empty">まだお気に入りがありません<br><small>画像を開いて「★ 保存」からセットを登録できます</small></div>';return;}
  favs.forEach((fav,i)=>{
    const card=document.createElement('div');card.className='fav-card';
    const loraChips=fav.loras?.map(l=>`<span class="fav-lora-chip">${esc(l.name)} ${esc(l.weight)}</span>`).join('')||'';
    card.innerHTML=`
      <div class="fav-card-header">
        <span class="fav-card-name">${esc(fav.name)}</span>
        ${fav.format?`<span class="fav-card-fmt">${esc(fav.format)}</span>`:''}
        <button class="fav-card-del" onclick="deleteFavorite(${i})">×</button>
      </div>
      <div class="fav-section"><div class="fav-section-label pos">Positive</div>
        <div class="fav-preview pos ${!fav.positive?'empty':''}">${fav.positive?esc(fav.positive):'（なし）'}</div></div>
      <div class="fav-section"><div class="fav-section-label neg">Negative</div>
        <div class="fav-preview neg ${!fav.negative?'empty':''}">${fav.negative?esc(fav.negative):'（なし）'}</div></div>
      ${loraChips?`<div class="fav-loras">${loraChips}</div>`:''}
      <div class="fav-actions">
        <button class="fav-copy-btn" onclick="favCopy(this,${i},'positive')">Positive コピー</button>
        <button class="fav-copy-btn" onclick="favCopy(this,${i},'negative')">Negative コピー</button>
      </div>`;
    list.appendChild(card);
  });
}
function deleteFavorite(idx){const favs=loadFavs();favs.splice(idx,1);saveFavs(favs);updateFavBadge();renderFavoritesList();}
function favCopy(btn,idx,type){const favs=loadFavs();doCopy(btn,favs[idx]?.[type]||'');}

// ═══════════════════════════════════════════
//  Save dialog
// ═══════════════════════════════════════════
let pendingSaveData=null;
function promptSaveFavorite(){
  const d=images[currentIdx]?.data;if(!d)return;
  pendingSaveData=d;
  const name=images[currentIdx]?.name?.replace(/\.[^.]+$/,'')||'新しいセット';
  const input=document.getElementById('save-name-input');
  input.value=name;
  history.pushState({overlay:'save'},'');
  document.getElementById('save-overlay').classList.add('open');
  setTimeout(()=>input.focus(),100);
}
function confirmSaveFavorite(){
  if(!pendingSaveData)return;
  const name=document.getElementById('save-name-input').value.trim()||'名称未設定';
  const favs=loadFavs();
  favs.unshift({id:Date.now(),name,positive:pendingSaveData.positive||'',negative:pendingSaveData.negative||'',loras:pendingSaveData.loras||[],format:pendingSaveData.format||'',savedAt:Date.now()});
  saveFavs(favs);updateFavBadge();
  closeSaveDialog(true);
  showToast('★ お気に入りに保存しました');
}
function closeSaveDialog(skipBack=false){
  document.getElementById('save-overlay').classList.remove('open');
  pendingSaveData=null;
  if(!_backInProgress&&!skipBack)history.back();
}
function onSaveOverlayClick(e){if(e.target===document.getElementById('save-overlay'))closeSaveDialog();}

// ═══════════════════════════════════════════
//  Image view
// ═══════════════════════════════════════════
let _ivScale=1,_ivPanX=0,_ivPanY=0;
let _ivLastMoveX=0,_ivLastMoveY=0;
let _ivStartDist=0,_ivStartScale=1;
let _ivLastTap=0;

function openImageView(idx){
  currentIdx=idx;
  _ivScale=1;_ivPanX=0;_ivPanY=0;
  renderImageView();
  history.pushState({overlay:'iv'},'');
  document.getElementById('iv-overlay').classList.add('open');
  const hint=document.getElementById('iv-hint');
  hint.classList.remove('hide');
  setTimeout(()=>hint.classList.add('hide'),2500);
}
function closeImageView(){
  document.getElementById('iv-overlay').classList.remove('open');
  if(!_backInProgress)history.back();
}
function ivNavigate(dir){
  const pos=visibleList.indexOf(currentIdx);
  const next=pos+dir;if(next<0||next>=visibleList.length)return;
  currentIdx=visibleList[next];
  _ivScale=1;_ivPanX=0;_ivPanY=0;
  renderImageView();
}
function renderImageView(){
  const item=images[currentIdx];const d=item?.data;
  document.getElementById('iv-img').src=item.url;
  document.getElementById('iv-fname').textContent=item.name;
  document.getElementById('iv-fmt').textContent=d?d.format:'不明';
  _ivApply(false);
  const pos=visibleList.indexOf(currentIdx);
  document.getElementById('iv-prev').disabled=pos<=0;
  document.getElementById('iv-next').disabled=pos>=visibleList.length-1;
  const tabBar=document.getElementById('iv-tab-bar');
  const content=document.getElementById('iv-content');
  tabBar.innerHTML='';content.innerHTML='';
  if(!d){content.innerHTML='<div class="no-data">メタデータが見つかりませんでした<br><small>A1111 / ComfyUI / Fooocus / InvokeAI 対応</small></div>';return;}
  const tabs=[];
  tabs.push({id:'prompts',label:'プロンプト',render:renderPrompts});
  if(d.loras?.length)tabs.push({id:'lora',label:`LoRA (${d.loras.length})`,render:renderLoras});
  if(d.instantID?.length)tabs.push({id:'id',label:'InstantID',render:renderInstantID});
  if(Object.keys(d.settings||{}).length)tabs.push({id:'settings',label:'設定',render:renderSettings});
  tabs.forEach((tab,i)=>{
    const btn=document.createElement('button');
    btn.className='iv-tab-btn'+(i===0?' active':'');btn.textContent=tab.label;
    btn.onclick=()=>{
      tabBar.querySelectorAll('.iv-tab-btn').forEach(b=>b.classList.remove('active'));
      content.querySelectorAll('.iv-tab-pane').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');document.getElementById('iv-tp-'+tab.id).classList.add('active');
      content.scrollTop=0;
    };
    tabBar.appendChild(btn);
    const pane=document.createElement('div');
    pane.className='iv-tab-pane'+(i===0?' active':'');pane.id='iv-tp-'+tab.id;
    pane.innerHTML=tab.render(d);content.appendChild(pane);
  });
}

function _ivApply(anim){
  const img=document.getElementById('iv-img');
  img.style.transition=anim?'transform .2s':'none';
  img.style.transform=`translate(${_ivPanX}px,${_ivPanY}px) scale(${_ivScale})`;
}

(()=>{
  const area=document.getElementById('iv-img-area');
  let _swipeStartY=0;
  area.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===2){
      _ivStartDist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      _ivStartScale=_ivScale;
    }else if(e.touches.length===1){
      const now=Date.now();
      if(now-_ivLastTap<280){
        _ivLastTap=0;
        if(_ivScale>1.5){_ivScale=1;_ivPanX=0;_ivPanY=0;}else{_ivScale=3;}
        _ivApply(true);return;
      }
      _ivLastTap=now;
      _ivLastMoveX=e.touches[0].clientX;
      _ivLastMoveY=e.touches[0].clientY;
      _swipeStartY=e.touches[0].clientY;
    }
  },{passive:false});
  area.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2){
      const dist=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      _ivScale=Math.max(1,Math.min(10,_ivStartScale*dist/_ivStartDist));
      _ivApply(false);
    }else if(e.touches.length===1){
      const dx=e.touches[0].clientX-_ivLastMoveX;
      const dy=e.touches[0].clientY-_ivLastMoveY;
      if(_ivScale>1){_ivPanX+=dx;_ivPanY+=dy;_ivApply(false);}
      _ivLastMoveX=e.touches[0].clientX;
      _ivLastMoveY=e.touches[0].clientY;
    }
  },{passive:false});
  area.addEventListener('touchend',e=>{
    if(e.touches.length===0&&_ivScale<=1){
      const dy=e.changedTouches[0].clientY-_swipeStartY;
      if(Math.abs(dy)>80)closeImageView();
      _ivScale=1;_ivPanX=0;_ivPanY=0;_ivApply(true);
    }
  },{passive:true});
})();

// ─── Tab renderers ───
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hlLora(t){return esc(t).replace(/&lt;lora:[^&]*&gt;/g,m=>`<span class="lora-hi">${m}</span>`);}

function renderPrompts(d){
  const pos=d.positive||'',neg=d.negative||'';
  return`<div class="prompt-block">
    <div class="prompt-row">
      <span class="prompt-label lbl-pos">Positive</span>
      <div class="prompt-actions">
        <button class="btn-star" onclick="promptSaveFavorite()">★ 保存</button>
        <button class="btn-copy" onclick="copyPrompt(this,'positive')">コピー</button>
      </div>
    </div>
    <div class="prompt-text pos ${!pos?'empty':''}">${pos?hlLora(pos):'（なし）'}</div>
  </div>
  <div class="prompt-block">
    <div class="prompt-row">
      <span class="prompt-label lbl-neg">Negative</span>
      <button class="btn-copy" onclick="copyPrompt(this,'negative')">コピー</button>
    </div>
    <div class="prompt-text neg ${!neg?'empty':''}">${neg?hlLora(neg):'（なし）'}</div>
  </div>`;
}
function renderLoras(d){
  if(!d.loras?.length)return'<div class="no-data">LoRAなし</div>';
  return'<div class="lora-list">'+d.loras.map(l=>`
    <div class="lora-item">
      <span class="lora-name">${esc(l.name)}</span>
      <span class="lora-wt">${l.weight_clip?`model ${esc(l.weight)} / clip ${esc(l.weight_clip)}`:esc(l.weight)}</span>
    </div>`).join('')+'</div>';
}
function renderInstantID(d){
  if(!d.instantID?.length)return'<div class="no-data">InstantIDなし</div>';
  return d.instantID.map(id=>`<div class="id-item"><div class="id-source">${esc(id.source)}</div><div class="id-detail">${esc(id.detail)}</div></div>`).join('');
}
function renderSettings(d){
  const s=d.settings||{};if(!Object.keys(s).length)return'<div class="no-data">設定なし</div>';
  return'<div class="settings-list">'+Object.entries(s).map(([k,v])=>`
    <div class="setting-row"><span class="sk">${esc(k)}</span><span class="sv">${esc(v)}</span></div>`).join('')+'</div>';
}

// ═══════════════════════════════════════════
//  Compare
// ═══════════════════════════════════════════
function toggleCompareMode(){
  if(compareMode){exitCompareMode();showToast('比較モードを終了');}
  else{compareMode=true;document.getElementById('btn-cmp-toggle').classList.add('active');document.getElementById('gallery-wrap').classList.add('cmp-mode');showToast('2枚の画像を選択してください');}
}
function exitCompareMode(){
  compareMode=false;compareSelected=[];
  document.getElementById('btn-cmp-toggle').classList.remove('active');
  document.getElementById('gallery-wrap').classList.remove('cmp-mode');
  gallery.querySelectorAll('.g-cmp-ov').forEach(el=>{el.classList.remove('show');el.textContent='';});
  gallery.querySelectorAll('.g-item.cmp-selected').forEach(el=>el.classList.remove('cmp-selected'));
}
function toggleCompareSelect(idx){
  const pos=compareSelected.indexOf(idx);
  if(pos>=0){
    compareSelected.splice(pos,1);
    const el=gallery.querySelector(`.g-item[data-idx="${idx}"]`);
    if(el){el.classList.remove('cmp-selected');const ov=el.querySelector('.g-cmp-ov');ov.classList.remove('show');ov.textContent='';}
    compareSelected.forEach((i,n)=>{
      const ov=gallery.querySelector(`.g-item[data-idx="${i}"] .g-cmp-ov`);
      if(ov)ov.textContent=n===0?'①':'②';
    });
  }else if(compareSelected.length<2){
    compareSelected.push(idx);
    const label=compareSelected.length===1?'①':'②';
    const el=gallery.querySelector(`.g-item[data-idx="${idx}"]`);
    if(el){el.classList.add('cmp-selected');const ov=el.querySelector('.g-cmp-ov');ov.textContent=label;ov.classList.add('show');}
    showToast(label+' 選択');
    if(compareSelected.length===2)setTimeout(()=>openCompare(),300);
  }
}
function openCompare(){
  renderCompareView(images[compareSelected[0]],images[compareSelected[1]]);
  history.pushState({overlay:'cmp'},'');
  document.getElementById('cmp-overlay').classList.add('open');
}
function closeCompare(){
  document.getElementById('cmp-overlay').classList.remove('open');
  exitCompareMode();
  if(!_backInProgress)history.back();
}
function swapCompare(){compareSelected.reverse();renderCompareView(images[compareSelected[0]],images[compareSelected[1]]);}
function renderCompareView(a,b){
  document.getElementById('cmp-thumbs').innerHTML=`
    <div class="cmp-thumb"><img class="cmp-thumb-img" src="${a.url}" alt=""><div class="cmp-thumb-row"><span class="cmp-thumb-num">①</span><span class="cmp-thumb-name">${esc(a.name)}</span></div></div>
    <div class="cmp-thumb"><img class="cmp-thumb-img" src="${b.url}" alt=""><div class="cmp-thumb-row"><span class="cmp-thumb-num">②</span><span class="cmp-thumb-name">${esc(b.name)}</span></div></div>`;
  const da=a.data,db=b.data;
  const posA=da?.positive||'',posB=db?.positive||'';
  const negA=da?.negative||'',negB=db?.negative||'';
  const {rA:posRA,rB:posRB}=diffTokens(posA,posB);
  const {rA:negRA,rB:negRB}=diffTokens(negA,negB);
  document.getElementById('cmp-body').innerHTML=`
    <div class="cmp-legend"><mark class="diff-u">■</mark> そのプロンプトにのみ含まれるトークン</div>
    <div class="cmp-section">
      <div class="cmp-sec-label pos">Positive</div>
      <span class="cmp-img-num">①</span><div class="cmp-text pos">${posA?posRA:'<em>（なし）</em>'}</div>
      <span class="cmp-img-num">②</span><div class="cmp-text pos">${posB?posRB:'<em>（なし）</em>'}</div>
    </div>
    <div class="cmp-section">
      <div class="cmp-sec-label neg">Negative</div>
      <span class="cmp-img-num">①</span><div class="cmp-text neg">${negA?negRA:'<em>（なし）</em>'}</div>
      <span class="cmp-img-num">②</span><div class="cmp-text neg">${negB?negRB:'<em>（なし）</em>'}</div>
    </div>`;
}
function diffTokens(textA,textB){
  const parse=t=>t.split(',').map(s=>s.trim()).filter(Boolean);
  const tA=parse(textA),tB=parse(textB);
  const setA=new Set(tA.map(s=>s.toLowerCase()));
  const setB=new Set(tB.map(s=>s.toLowerCase()));
  const rA=tA.map(t=>setB.has(t.toLowerCase())?esc(t):`<mark class="diff-u">${esc(t)}</mark>`).join(', ');
  const rB=tB.map(t=>setA.has(t.toLowerCase())?esc(t):`<mark class="diff-u">${esc(t)}</mark>`).join(', ');
  return{rA,rB};
}

// ═══════════════════════════════════════════
//  Copy / Toast
// ═══════════════════════════════════════════
function copyPrompt(btn,type){const d=images[currentIdx]?.data;if(!d)return;doCopy(btn,d[type]||'');}
async function doCopy(btn,text,msg){
  try{if(navigator.clipboard?.writeText)await navigator.clipboard.writeText(text);else fallbackCopy(text);}
  catch(e){fallbackCopy(text);}
  if(btn){btn.classList.add('copied');const orig=btn.textContent;btn.textContent='✓';setTimeout(()=>{btn.classList.remove('copied');btn.textContent=orig;},1600);}
  showToast(msg||'コピーしました');
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;
  ta.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

// ═══════════════════════════════════════════
//  Back button
// ═══════════════════════════════════════════
window.addEventListener('popstate',()=>{
  _backInProgress=true;
  if(document.getElementById('save-overlay').classList.contains('open'))closeSaveDialog();
  else if(document.getElementById('fav-overlay').classList.contains('open'))closeFavorites();
  else if(document.getElementById('cmp-overlay').classList.contains('open'))closeCompare();
  else if(document.getElementById('dir-overlay').classList.contains('open'))closeDirPicker();
  else if(document.getElementById('iv-overlay').classList.contains('open'))closeImageView();
  _backInProgress=false;
});

// ─── Init ───
window.addEventListener('load',()=>{
  document.getElementById('path-input').value=window.AndroidBridge.getPicturesPath();
  updateFavBadge();
});
